---
# Redis for Twenty CRM (job queue and pub/sub)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-redis
  namespace: twenty
  labels:
    app.kubernetes.io/name: twenty-redis
    app.kubernetes.io/part-of: twenty
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: twenty-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twenty-redis
        app.kubernetes.io/part-of: twenty
    spec:
      containers:
        - name: redis
          image: redis:7
          imagePullPolicy: IfNotPresent
          args: ["--maxmemory-policy", "noeviction"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-redis
  namespace: twenty
  labels:
    app.kubernetes.io/name: twenty-redis
    app.kubernetes.io/part-of: twenty
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: twenty-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
