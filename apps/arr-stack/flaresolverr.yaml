# ── FlareSolverr (Cloudflare challenge bypass for Jackett) ───────────────────
# WebUI/API: port 8191  (internal only — Jackett talks to it directly)
#
# After deploying, configure in Jackett:
#   Dashboard → FlareSolverr API URL: http://flaresolverr:8191
#   Then on any indexer that shows "Challenge detected": set the
#   "FlareSolverr" proxy tag on that indexer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - name: api
              containerPort: 8191
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: flaresolverr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flaresolverr
  ports:
    - name: api
      port: 8191
      targetPort: api
