# ── kube-state-metrics ────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitoring-kube-state-metrics
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - nodes
      - pods
      - services
      - serviceaccounts
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
    verbs: ["list", "watch"]
  - apiGroups: [apps]
    resources:
      - statefulsets
      - daemonsets
      - deployments
      - replicasets
    verbs: ["list", "watch"]
  - apiGroups: [batch]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
  - apiGroups: [autoscaling]
    resources:
      - horizontalpodautoscalers
    verbs: ["list", "watch"]
  - apiGroups: [policy]
    resources:
      - poddisruptionbudgets
    verbs: ["list", "watch"]
  - apiGroups: [networking.k8s.io]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["list", "watch"]
  - apiGroups: [storage.k8s.io]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list", "watch"]
  - apiGroups: [admissionregistration.k8s.io]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["list", "watch"]
  - apiGroups: [rbac.authorization.k8s.io]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["list", "watch"]
  - apiGroups: [coordination.k8s.io]
    resources:
      - leases
    verbs: ["list", "watch"]
  - apiGroups: [certificates.k8s.io]
    resources:
      - certificatesigningrequests
    verbs: ["list", "watch"]
  - apiGroups: [discovery.k8s.io]
    resources:
      - endpointslices
    verbs: ["list", "watch"]
  - apiGroups: [scheduling.k8s.io]
    resources:
      - priorityclasses
    verbs: ["list", "watch"]
  - apiGroups: [authentication.k8s.io]
    resources:
      - tokenreviews
    verbs: ["create"]
  - apiGroups: [authorization.k8s.io]
    resources:
      - subjectaccessreviews
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitoring-kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitoring-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: monitoring
---
# ── Node Exporter ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-exporter
  namespace: monitoring
