# ── VPN IP rotation RBAC + CronJob ───────────────────────────────────────────
#
# The gluetun sidecar lives inside the FlareSolverr pod (see flaresolverr.yaml).
# Restarting that deployment causes gluetun to reconnect to a new randomly
# selected ProtonVPN server, giving a fresh egress IP.
#
# The gluetun-proxy Service (also in flaresolverr.yaml) continues to expose
# gluetun's HTTP proxy on port 8888 for Prowlarr — no Prowlarr config change needed.
#
# ── RBAC for the IP-rotation CronJob ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gluetun-rotator
  namespace: arr-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gluetun-rotator
  namespace: arr-stack
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["flaresolverr"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gluetun-rotator
  namespace: arr-stack
subjects:
  - kind: ServiceAccount
    name: gluetun-rotator
    namespace: arr-stack
roleRef:
  kind: Role
  name: gluetun-rotator
  apiGroup: rbac.authorization.k8s.io
---
# ── CronJob: rotate the VPN exit IP every 6 hours ────────────────────────────
# Triggers a rollout restart of the flaresolverr deployment (which contains the
# gluetun sidecar), causing Gluetun to reconnect to a randomly selected
# ProtonVPN server — giving a fresh egress IP for both FlareSolverr and Prowlarr.
# Adjust the schedule to taste (cron syntax, UTC).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gluetun-rotate
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: gluetun-rotate
spec:
  schedule: "0 */6 * * *"   # every 6 hours — change to e.g. "0 */1 * * *" for hourly
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: gluetun-rotator
          restartPolicy: OnFailure
          containers:
            - name: rotate
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - kubectl
                - rollout
                - restart
                - deployment/flaresolverr
                - -n
                - arr-stack
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
