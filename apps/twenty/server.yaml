---
# Twenty CRM server — REST/GraphQL API + migrations + cron jobs
# Port: 3000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-server
  namespace: twenty
  labels:
    app.kubernetes.io/name: twenty-server
    app.kubernetes.io/part-of: twenty
spec:
  replicas: 1
  # Recreate: the server runs DB migrations on startup. Only one instance at
  # a time may hold the migration lock.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: twenty-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twenty-server
        app.kubernetes.io/part-of: twenty
    spec:
      # Wait for postgres and redis to be ready before starting.
      initContainers:
        - name: wait-for-db
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h twenty-db -U $(POSTGRES_USER) -d default; do
                echo "waiting for postgres…"; sleep 2; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: twenty-db-secret
                  key: POSTGRES_USER
      containers:
        - name: twenty
          image: twentycrm/twenty:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_PORT
              value: "3000"
            # ── Database ─────────────────────────────────────────────────────
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: twenty-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twenty-db-secret
                  key: POSTGRES_PASSWORD
            - name: PG_DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@twenty-db:5432/default"
            # ── App secrets ──────────────────────────────────────────────────
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: twenty-app-secret
                  key: APP_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: twenty-app-secret
                  key: ENCRYPTION_KEY
            # ── Redis ────────────────────────────────────────────────────────
            - name: REDIS_URL
              value: "redis://twenty-redis:6379"
            # ── Public URL — update to your cluster hostname/IP ──────────────
            # Example: http://twenty.local or http://192.168.1.x:3000
            - name: SERVER_URL
              value: "http://twenty.local:3000"
          volumeMounts:
            - name: server-storage
              mountPath: /app/packages/twenty-server/.local-storage
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: server-storage
          persistentVolumeClaim:
            claimName: twenty-server-storage
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-server
  namespace: twenty
  labels:
    app.kubernetes.io/name: twenty-server
    app.kubernetes.io/part-of: twenty
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: twenty-server
  ports:
    - name: http
      port: 3000
      targetPort: http
