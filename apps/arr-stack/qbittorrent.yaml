# ── qBittorrent ───────────────────────────────────────────────────────────────
# WebUI: port 8080  (access via: kubectl port-forward -n arr-stack svc/qbittorrent 8080:8080)
# Default credentials: admin / adminadmin  (change immediately on first login)
#
# After first login, configure in qBittorrent Settings → Downloads:
#   Default save path: /data/torrents
#
# Add categories to keep *arr downloads organised:
#   radarr  → /data/torrents/movies
#   sonarr  → /data/torrents/tv
#   lidarr  → /data/torrents/music
#
# Torrent port 6881 (TCP+UDP) is exposed via hostPort so your router can
# forward it directly to the node.  Adjust if your k3s node IP differs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: arr-downloads
                    operator: In
                    values:
                      - "true"
      securityContext:
        fsGroup: 1000
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Etc/UTC"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: webui
              containerPort: 8080
            # hostPort forwards the torrent traffic directly from the node.
            # Your router should port-forward 6881 TCP+UDP → this node.
            - name: torrent-tcp
              containerPort: 6881
              hostPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              hostPort: 6881
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/torrents
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: arr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: webui
