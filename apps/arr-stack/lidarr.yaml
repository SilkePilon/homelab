# ── Lidarr (Music) ────────────────────────────────────────────────────────────
# WebUI: port 8686  (kubectl port-forward -n arr-stack svc/lidarr 8686:8686)
#
# After first login, configure in Lidarr:
#   Settings → Media Management → Import Mode: Move
#   Settings → Media Management → Root Folders: /data/media/music
#   Settings → Download Clients → Add qBittorrent:
#     Host: qbittorrent   Port: 8080   Category: lidarr
#   Settings → Indexers → Add Torznab:
#     URL: http://jackett:9117/api/v2.0/indexers/YOUR_INDEXER/results/torznab/
#     API Key: (copy from Jackett dashboard)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: lidarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lidarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lidarr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: lidarr
          image: lscr.io/linuxserver/lidarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - name: webui
              containerPort: 8686
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/torrents
            - name: media
              mountPath: /data/media
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ping
              port: webui
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /ping
              port: webui
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: lidarr-config
        - name: downloads
          persistentVolumeClaim:
            claimName: arr-downloads
        - name: media
          persistentVolumeClaim:
            claimName: arr-media
---
apiVersion: v1
kind: Service
metadata:
  name: lidarr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: lidarr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lidarr
  ports:
    - name: webui
      port: 8686
      targetPort: webui
