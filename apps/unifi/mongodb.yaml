---
# ─────────────────────────────────────────────────────────────────────────────
# MongoDB — backing database for the UniFi Network Application.
# The init script (mounted from the ConfigMap below) runs on first start and
# creates the 'unifi' database user. MONGO_PASS is injected from the
# 'unifi-secret' Secret you created before applying this stack.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init
  namespace: unifi
data:
  # Shell init scripts in /docker-entrypoint-initdb.d/ have access to the
  # container's environment variables, so MONGO_PASS is substituted at runtime.
  init-mongo.sh: |
    #!/bin/bash
    mongosh <<EOF
    db.getSiblingDB("${MONGO_DBNAME}").createUser({
      user: "${MONGO_USER}",
      pwd: "${MONGO_PASS}",
      roles: [
        { role: "dbOwner", db: "${MONGO_DBNAME}" },
        { role: "dbOwner", db: "${MONGO_DBNAME}_stat" }
      ]
    })
    EOF
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: unifi
  labels:
    app.kubernetes.io/name: mongodb
spec:
  replicas: 1
  # Recreate: PVC is ReadWriteOnce; only one pod may write at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:4.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: MONGO_USER
              value: "unifi"
            - name: MONGO_DBNAME
              value: "unifi"
            # Password comes from the secret you created before deploying.
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-secret
                  key: MONGO_PASS
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 200m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongodb-data
        - name: init
          configMap:
            name: mongodb-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: unifi
  labels:
    app.kubernetes.io/name: mongodb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
