---
# Penpot exporter — headless Chromium for PDF/PNG export
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-exporter
  namespace: penpot
  labels:
    app.kubernetes.io/name: penpot-exporter
    app.kubernetes.io/part-of: penpot
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: penpot-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: penpot-exporter
        app.kubernetes.io/part-of: penpot
    spec:
      containers:
        - name: exporter
          image: penpotapp/exporter:2.16
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7070
          env:
            - name: PENPOT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: penpot-secret
                  key: PENPOT_SECRET_KEY
            # Exporter reaches the frontend internally
            - name: PENPOT_PUBLIC_URI
              value: "http://penpot-frontend:8080"
            - name: PENPOT_REDIS_URI
              value: "redis://penpot-valkey/0"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-exporter
  namespace: penpot
  labels:
    app.kubernetes.io/name: penpot-exporter
    app.kubernetes.io/part-of: penpot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: penpot-exporter
  ports:
    - name: http
      port: 7070
      targetPort: http
