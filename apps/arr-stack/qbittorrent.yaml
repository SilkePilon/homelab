# ── qBittorrent ───────────────────────────────────────────────────────────────
# WebUI: port 8080  (access via: kubectl port-forward -n arr-stack svc/qbittorrent 8080:8080)
#
# VPN: gluetun sidecar routes all traffic through ProtonVPN WireGuard.
# Port forwarding is handled automatically by gluetun + the port-updater sidecar.
#
# Required secrets (create out-of-band — NOT in git):
#
#   1. ProtonVPN WireGuard private key:
#      - Go to https://account.proton.me/vpn/wireguard
#      - Create a new WireGuard key, download a P2P config (e.g. NL#1)
#      - Extract PrivateKey from the [Interface] section
#      kubectl create secret generic protonvpn-wg -n arr-stack \
#        --from-literal=privateKey=<PrivateKey>
#
#   2. qBittorrent credentials (for port-updater to call qBittorrent API):
#      kubectl create secret generic qbittorrent-creds -n arr-stack \
#        --from-literal=username=admin \
#        --from-literal=password=<your qbittorrent password>
#
# After first login, configure in qBittorrent Settings → Downloads:
#   Default save path: /data/torrents
#
# Add categories to keep *arr downloads organised:
#   radarr  → /data/torrents/movies
#   sonarr  → /data/torrents/tv
#   lidarr  → /data/torrents/music
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: arr-downloads
                    operator: In
                    values:
                      - "true"
      securityContext:
        fsGroup: 1000
      initContainers:
        # Ensure /dev/net/tun exists before gluetun starts
        - name: init-tun
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /dev/net
              [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
              chmod 0666 /dev/net/tun
          securityContext:
            privileged: true
      containers:
        # ── gluetun: ProtonVPN WireGuard tunnel ──────────────────────────────
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          lifecycle:
            postStart:
              exec:
                # Clean up stale IP rules from previous pod exits (Kubernetes shares
                # IP rules across the pod namespace). Fix from gluetun wiki:
                # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md
                command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: privateKey
            - name: WIREGUARD_PUBLIC_KEY
              value: "pWeh73ei2uNWC7PhHbYu45a0tfoI1YAieeXfib9ne3g="
            - name: WIREGUARD_ADDRESSES
              value: "10.2.0.2/32"
            - name: WIREGUARD_ENDPOINT_IP
              value: "169.150.196.66"
            - name: WIREGUARD_ENDPOINT_PORT
              value: "51820"
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: "25s"
            # Lower MTU fixes TCP MSS clamping issues (ICMP works but TCP times out)
            - name: WIREGUARD_MTU
              value: "1280"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: protonvpn
            - name: TZ
              value: "Etc/UTC"
            # Disable IPv6 — fixes "adding IPv6 rule: file exists" on Kubernetes
            - name: BLOCK_IPV6
              value: "on"
            - name: WIREGUARD_ALLOWED_IPS
              value: "0.0.0.0/0"
            # Use DoH (port 443) instead of DoT (port 853) — ProtonVPN blocks TCP:853 at exit nodes
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "doh"
            # Use IPs directly — healthcheck uses system /etc/resolv.conf (k8s CoreDNS 10.43.0.10)
            # which is blocked by gluetun's firewall once VPN is up, causing lookup timeouts
            - name: HEALTH_TARGET_ADDRESSES
              value: "1.1.1.1:443,8.8.8.8:443"
            # Disable unused proxy features
            - name: HTTPPROXY
              value: "off"
            - name: SHADOWSOCKS
              value: "off"
          ports:
            - name: gluetun-ctrl
              containerPort: 8000
          volumeMounts:
            - name: gluetun-tmp
              mountPath: /tmp/gluetun
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        # ── qBittorrent ───────────────────────────────────────────────────────
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Etc/UTC"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: webui
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/torrents
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 90
            periodSeconds: 30
        # ── port-updater: syncs gluetun forwarded port → qBittorrent ─────────
        # Polls gluetun's control API every 60s and updates qBittorrent's
        # listening port so incoming VPN connections actually reach the client.
        - name: port-updater
          image: curlimages/curl:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-creds
                  key: username
            - name: QB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-creds
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              QB_URL="http://localhost:8080"
              PORT_FILE="/tmp/gluetun/forwarded_port"
              LAST_PORT=0
              echo "[port-updater] starting"
              while true; do
                if [ -f "$PORT_FILE" ]; then
                  PORT=$(cat "$PORT_FILE" | tr -d '[:space:]')
                else
                  PORT=0
                fi
                if [ -n "$PORT" ] && [ "$PORT" -gt 0 ] 2>/dev/null && [ "$PORT" != "$LAST_PORT" ]; then
                  echo "[port-updater] new port: ${PORT}, updating qBittorrent"
                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -c /tmp/qb-cookies.txt \
                    --data "username=${QB_USERNAME}&password=${QB_PASSWORD}" \
                    "${QB_URL}/api/v2/auth/login")
                  if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
                    curl -sf -b /tmp/qb-cookies.txt \
                      --data "json={\"listen_port\":${PORT},\"random_port\":false}" \
                      "${QB_URL}/api/v2/app/setPreferences" > /dev/null
                    echo "[port-updater] port updated to ${PORT}"
                    LAST_PORT=$PORT
                  else
                    echo "[port-updater] qBittorrent auth failed (HTTP ${HTTP_CODE}), will retry"
                  fi
                fi
                sleep 30
              done
          volumeMounts:
            - name: gluetun-tmp
              mountPath: /tmp/gluetun
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: gluetun-tmp
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: arr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: webui
