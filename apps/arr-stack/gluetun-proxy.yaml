# ── Gluetun HTTP proxy (shared VPN proxy for Prowlarr / FlareSolverr) ────────
#
# This is a DEDICATED Gluetun instance separate from the qBittorrent sidecar.
# It exposes an HTTP proxy on port 8888 so that FlareSolverr (and Prowlarr if
# needed) can route outbound requests through ProtonVPN, bypassing indexer IP
# bans.
#
# Unlike the qBittorrent sidecar which uses a hardcoded WireGuard endpoint,
# this deployment uses the native ProtonVPN provider so Gluetun selects a
# random matching server on every start. Combined with the gluetun-rotate
# CronJob, this rotates the egress IP automatically.
#
# Re-uses the existing protonvpn-wg secret (same private key, different
# server selected by Gluetun from ProtonVPN's server list each restart).
#
# Usage from other pods in arr-stack:
#   HTTP_PROXY=http://gluetun-proxy:8888
#   HTTPS_PROXY=http://gluetun-proxy:8888
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun-proxy
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: gluetun-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gluetun-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gluetun-proxy
    spec:
      dnsPolicy: ClusterFirst
      initContainers:
        - name: init-tun
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /dev/net
              [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
              chmod 0666 /dev/net/tun
          securityContext:
            privileged: true
      containers:
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
          env:
            # Use ProtonVPN native provider — Gluetun picks a random matching
            # server from ProtonVPN's server list on every start, so each
            # restart (see gluetun-rotate CronJob) gives a new egress IP.
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: privateKey
            # Restrict to P2P-capable servers in privacy-friendly jurisdictions.
            # Gluetun will randomly pick one on each start.
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: SERVER_COUNTRIES
              value: "Netherlands,Switzerland,Sweden,Iceland"
            # Expose the HTTP proxy — this is the whole point of this deployment
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            # Health check via IP rather than DNS (CoreDNS is unreachable through
            # the VPN tunnel after it comes up)
            - name: HEALTH_TARGET_ADDRESSES
              value: "1.1.1.1:443,8.8.8.8:443"
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "doh"
            # Quad9 works more reliably through ProtonVPN than Cloudflare DoH
            - name: DOH_UPSTREAM_RESOLVERS
              value: "quad9,google"
            - name: TZ
              value: "Etc/UTC"
            - name: BLOCK_IPV6
              value: "on"
            - name: WIREGUARD_ALLOWED_IPS
              value: "0.0.0.0/0"
            - name: WIREGUARD_MTU
              value: "1280"
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: "25s"
            # No port forwarding needed — this is a proxy only, not a torrent client
            - name: VPN_PORT_FORWARDING
              value: "off"
            - name: SHADOWSOCKS
              value: "off"
            - name: BLOCK_MALICIOUS
              value: "off"
            - name: BLOCK_SURVEILLANCE
              value: "off"
            - name: BLOCK_ADS
              value: "off"
          ports:
            - name: httpproxy
              containerPort: 8888
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: httpproxy
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: httpproxy
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gluetun-proxy
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: gluetun-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gluetun-proxy
  ports:
    - name: httpproxy
      port: 8888
      targetPort: httpproxy
---
# ── RBAC for the IP-rotation CronJob ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gluetun-rotator
  namespace: arr-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gluetun-rotator
  namespace: arr-stack
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["gluetun-proxy"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gluetun-rotator
  namespace: arr-stack
subjects:
  - kind: ServiceAccount
    name: gluetun-rotator
    namespace: arr-stack
roleRef:
  kind: Role
  name: gluetun-rotator
  apiGroup: rbac.authorization.k8s.io
---
# ── CronJob: rotate the VPN exit IP every 6 hours ────────────────────────────
# Triggers a rollout restart of gluetun-proxy, causing Gluetun to reconnect
# to a randomly selected ProtonVPN server — giving a fresh egress IP.
# Adjust the schedule to taste (cron syntax, UTC).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gluetun-rotate
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: gluetun-rotate
spec:
  schedule: "0 */6 * * *"   # every 6 hours — change to e.g. "0 */1 * * *" for hourly
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: gluetun-rotator
          restartPolicy: OnFailure
          containers:
            - name: rotate
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - kubectl
                - rollout
                - restart
                - deployment/gluetun-proxy
                - -n
                - arr-stack
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
