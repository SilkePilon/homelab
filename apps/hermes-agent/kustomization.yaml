apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Plain Kustomize base — consumed identically by Argo CD and Flux CD.
namespace: hermes-agent

resources:
  - namespace.yaml
  - pvc.yaml
  - service.yaml
  - deployment.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: homelab
    includeSelectors: false
