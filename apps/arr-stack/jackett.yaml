# ── Jackett (Torrent indexer proxy) ──────────────────────────────────────────
# WebUI: port 9117  (kubectl port-forward -n arr-stack svc/jackett 9117:9117)
#
# Jackett acts as a Torznab/Newznab proxy between *arr apps and tracker sites.
# After first login:
#   1. Add your indexers (trackers) in the Jackett UI.
#   2. Copy the Torznab URL and API Key for each indexer.
#   3. Add each indexer to Sonarr/Radarr/Lidarr as a Torznab indexer:
#        URL:     http://jackett:9117/api/v2.0/indexers/INDEXER_ID/results/torznab/
#        API Key: (shown in Jackett dashboard header)
#
# NOTE: Jackett config (including indexer credentials) is persisted on the PVC.
#       Back up jackett-config regularly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: jackett
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jackett
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jackett
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: jackett
          image: lscr.io/linuxserver/jackett:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Etc/UTC"
            # Disable the automatic update check inside the container — images
            # are updated by re-pulling instead.
            - name: AUTO_UPDATE
              value: "false"
          ports:
            - name: webui
              containerPort: 9117
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /UI/Login
              port: webui
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /UI/Login
              port: webui
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jackett-config
---
apiVersion: v1
kind: Service
metadata:
  name: jackett
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: jackett
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jackett
  ports:
    - name: webui
      port: 9117
      targetPort: webui
