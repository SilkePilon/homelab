# Pulls Hermes Agent secrets from 1Password via External Secrets Operator and
# renders a Kubernetes Secret named "hermes-agent-secrets" that the Deployment
# consumes through envFrom.
#
# PREREQUISITES (one-time, outside this app):
#   1. Install External Secrets Operator in the cluster.
#   2. Apply the "homelab" ClusterSecretStore (infrastructure/external-secrets).
#   3. In your 1Password "homelab" vault, create an item titled "hermes-agent"
#      with a field labeled "openrouter_api_key" (add more fields as needed).
#
# If ESO / the store is not configured yet, this ExternalSecret simply won't
# produce the Secret. The Deployment references it with optional: true, so Hermes
# still starts — you then configure provider keys interactively with `hermes setup`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent-secrets
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: homelab
    kind: ClusterSecretStore
  target:
    name: hermes-agent-secrets
    creationPolicy: Owner
  data:
    # 1Password SDK key format is "<item>/[section/]<field>" (no separate
    # property). Here: item "hermes-agent", field "openrouter_api_key".
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: hermes-agent/openrouter_api_key
    # Add more keys as needed, e.g. Signal/captcha tokens, tool API keys:
    # - secretKey: TAVILY_API_KEY
    #   remoteRef:
    #     key: hermes-agent/tavily_api_key
