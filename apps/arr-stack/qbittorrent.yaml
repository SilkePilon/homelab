# ── qBittorrent ───────────────────────────────────────────────────────────────
# WebUI: port 8080  (access via: kubectl port-forward -n arr-stack svc/qbittorrent 8080:8080)
#
# VPN: gluetun sidecar routes all traffic through ProtonVPN WireGuard.
# Port forwarding is handled automatically by gluetun via VPN_PORT_FORWARDING_UP_COMMAND.
#
# Required secrets (create out-of-band — NOT in git):
#
#   kubectl create secret generic protonvpn-wg -n arr-stack \
#     --from-literal=privateKey=<PrivateKey>
#   (Get PrivateKey from https://account.proton.me/vpn/wireguard → create WireGuard key → P2P config)
#
# After first login, enable in qBittorrent → Options → Web UI:
#   "Bypass authentication for clients on localhost" — required for VPN_PORT_FORWARDING_UP_COMMAND
#
# After first login, configure in qBittorrent Settings → Downloads:
#   Default save path: /data/torrents
#
# Add categories to keep *arr downloads organised:
#   radarr  → /data/torrents/movies
#   sonarr  → /data/torrents/tv
#   lidarr  → /data/torrents/music
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: arr-downloads
                    operator: In
                    values:
                      - "true"
      # Route DNS through gluetun's built-in DoH resolver (127.0.0.1:53).
      # Default k8s CoreDNS (10.43.0.10) is blocked by gluetun's firewall once VPN is up.
      # Use IPv4 loopback — BLOCK_IPV6=on causes EAGAIN on UDP to [::1]:53.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 127.0.0.1
        searches:
          - arr-stack.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      securityContext:
        fsGroup: 1000
      initContainers:
        # Ensure /dev/net/tun exists before gluetun starts
        - name: init-tun
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /dev/net
              [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
              chmod 0666 /dev/net/tun
          securityContext:
            privileged: true
      containers:
        # ── gluetun: ProtonVPN WireGuard tunnel ──────────────────────────────
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          lifecycle:
            postStart:
              exec:
                # Clean up stale IP rules from previous pod exits (Kubernetes shares
                # IP rules across the pod namespace). Fix from gluetun wiki:
                # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md
                command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wg
                  key: privateKey
            - name: WIREGUARD_PUBLIC_KEY
              value: "pWeh73ei2uNWC7PhHbYu45a0tfoI1YAieeXfib9ne3g="
            - name: WIREGUARD_ADDRESSES
              value: "10.2.0.2/32"
            - name: WIREGUARD_ENDPOINT_IP
              value: "169.150.196.66"
            - name: WIREGUARD_ENDPOINT_PORT
              value: "51820"
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: "25s"
            # Lower MTU fixes TCP MSS clamping issues (ICMP works but TCP times out)
            - name: WIREGUARD_MTU
              value: "1280"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: protonvpn
            - name: TZ
              value: "Etc/UTC"
            # Disable IPv6 — fixes "adding IPv6 rule: file exists" on Kubernetes
            - name: BLOCK_IPV6
              value: "on"
            - name: WIREGUARD_ALLOWED_IPS
              value: "0.0.0.0/0"
            # Use DoH (port 443) instead of DoT (port 853) — ProtonVPN blocks TCP:853 at exit nodes
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "doh"
            # Use IPs directly — healthcheck uses system /etc/resolv.conf (k8s CoreDNS 10.43.0.10)
            # which is blocked by gluetun's firewall once VPN is up, causing lookup timeouts
            - name: HEALTH_TARGET_ADDRESSES
              value: "1.1.1.1:443,8.8.8.8:443"
            # Disable unused proxy features
            - name: HTTPPROXY
              value: "off"
            - name: SHADOWSOCKS
              value: "off"
            # Disable DNS block lists — they consume ~200MB RAM on download/parse
            - name: BLOCK_MALICIOUS
              value: "off"
            - name: BLOCK_SURVEILLANCE
              value: "off"
            - name: BLOCK_ADS
              value: "off"
            # Push forwarded port directly into qBittorrent on every port change.
            # Requires qBittorrent → Options → Web UI → "Bypass auth for localhost" enabled.
            # {{PORT}} is replaced by gluetun with the forwarded port number.
            - name: VPN_PORT_FORWARDING_UP_COMMAND
              value: >-
                /bin/sh -c 'wget -O- -nv --retry-connrefused
                --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}"
                http://127.0.0.1:8080/api/v2/app/setPreferences'
            - name: VPN_PORT_FORWARDING_DOWN_COMMAND
              value: >-
                /bin/sh -c 'wget -O- -nv --retry-connrefused
                --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}"
                http://127.0.0.1:8080/api/v2/app/setPreferences'
          ports:
            - name: gluetun-ctrl
              containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
        # ── qBittorrent ───────────────────────────────────────────────────────
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Etc/UTC"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: webui
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/torrents
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: webui
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: arr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: webui
      port: 8080
      targetPort: webui
