apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
spec:
  replicas: 1
  # CRITICAL: never run two gateways against the same data volume. Recreate
  # guarantees the old pod is gone before a new one mounts the PVC.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
    spec:
      # The image's s6 entrypoint starts as root to chown /opt/data, then drops
      # to the unprivileged "hermes" user (UID 10000). Do NOT force runAsNonRoot.
      # fsGroup makes the PVC group-writable by that user.
      securityContext:
        fsGroup: 10000
      containers:
        - name: hermes-agent
          image: docker.io/nousresearch/hermes-agent:latest
          # GitOps tip: pin to a released tag/digest instead of :latest, e.g.
          # docker.io/nousresearch/hermes-agent:v2026.5.29.2
          imagePullPolicy: IfNotPresent
          # Passed through to the s6 main-wrapper -> `hermes gateway run`.
          args:
            - gateway
            - run
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            # Trusted-LAN access via port-forward only. This skips the OAuth gate
            # and EXPOSES API keys/session data to anyone who can reach the port.
            # Keep the Service ClusterIP-only. Remove this and wire OAuth if you
            # ever expose the dashboard beyond localhost port-forward.
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - name: dashboard
              containerPort: 9119
            - name: gateway
              containerPort: 8642
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              # Bump to 4Gi if you enable browser/Playwright tools.
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: dashboard
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        # Shared memory for Playwright/Chromium (mirrors `docker run --shm-size`).
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
