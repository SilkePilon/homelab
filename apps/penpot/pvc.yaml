---
# Penpot requires a secret key — create it before applying:
#
#   kubectl create namespace penpot
#
#   kubectl create secret generic penpot-secret \
#     --from-literal=PENPOT_SECRET_KEY="$(python3 -c 'import secrets; print(secrets.token_urlsafe(64))')" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 24)" \
#     -n penpot
#
---
# Shared PVC for assets (files/images uploaded by users).
# Mounted by both the frontend and the backend.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: penpot-assets
  namespace: penpot
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: penpot-postgres
  namespace: penpot
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
