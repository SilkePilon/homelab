---
# Penpot MCP server — Model Context Protocol server for AI integrations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-mcp
  namespace: penpot
  labels:
    app.kubernetes.io/name: penpot-mcp
    app.kubernetes.io/part-of: penpot
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: penpot-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: penpot-mcp
        app.kubernetes.io/part-of: penpot
    spec:
      containers:
        - name: mcp
          image: penpotapp/mcp:2.16
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7979
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-mcp
  namespace: penpot
  labels:
    app.kubernetes.io/name: penpot-mcp
    app.kubernetes.io/part-of: penpot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: penpot-mcp
  ports:
    - name: http
      port: 7979
      targetPort: http
