# ── FlareSolverr + Gluetun VPN sidecar ───────────────────────────────────────
# WebUI/API: port 8191  (internal only — ext-to-torznab talks to it directly)
#
# Gluetun runs as a sidecar so ALL of FlareSolverr's Chromium traffic exits
# through ProtonVPN natively (shared network namespace — no HTTP_PROXY needed).
# Gluetun also exposes an HTTP proxy on :8888, reachable cluster-wide via the
# gluetun-proxy Service below, so other apps can route requests through
# the same VPN tunnel.
#
# IP rotation: the gluetun-rotate CronJob (in gluetun-proxy.yaml) restarts
# this deployment every 6 hours, causing Gluetun to pick a new random
# ProtonVPN server — giving a fresh egress IP.
#
# ext-to-torznab connects to FlareSolverr at http://flaresolverr:8191
# (configured via the FLARESOLVERR_URL env var in ext-to-torznab.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: flaresolverr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
    spec:
      # GLUETUN DISABLED FOR TESTING — FlareSolverr runs without VPN, direct
      # internet access via cluster DNS. To re-enable gluetun, restore the
      # dnsPolicy/dnsConfig block, initContainers, and gluetun container from git.
      dnsPolicy: ClusterFirst
      containers:
        # ── FlareSolverr ─────────────────────────────────────────────────────
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: TZ
              value: "Etc/UTC"
            # GLUETUN DISABLED: traffic goes direct (no VPN tunnel).
          ports:
            - name: api
              containerPort: 8191
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes: []
---
# FlareSolverr API — used by Prowlarr to send challenge-solving requests
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: arr-stack
  labels:
    app.kubernetes.io/name: flaresolverr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flaresolverr
  ports:
    - name: api
      port: 8191
      targetPort: api

