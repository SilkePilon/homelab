# Cluster-wide 1Password store used by every app's ExternalSecret.
#
# Uses the 1Password *SDK* provider (onepasswordSDK) — the recommended path.
# It talks to 1Password.com directly with a Service Account token, so there is
# NO Connect server to run. (The older `onepassword` Connect provider is now
# deprecated by External Secrets.)
#
# A store is scoped to a SINGLE vault, by design. Point `vault` at the 1Password
# vault that holds your homelab items.
#
# PREREQUISITES (one-time, done by hand — these can't live in Git):
#   1. Install External Secrets Operator (see infrastructure/external-secrets/README
#      or the repo README).
#   2. Create a 1Password Service Account with read access to the vault below:
#      https://developer.1password.com/docs/service-accounts/
#   3. Store its token in a Kubernetes Secret in the external-secrets namespace:
#        kubectl -n external-secrets create secret generic onepassword-token \
#          --from-literal=token='ops_eyJ...'
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: homelab
spec:
  provider:
    onepasswordSDK:
      # The 1Password vault these credentials live in. Change to your vault name.
      vault: homelab
      auth:
        serviceAccountSecretRef:
          name: onepassword-token
          key: token
          # Required for ClusterSecretStore (cluster-scoped) — namespace of the
          # token Secret created in prerequisite step 3.
          namespace: external-secrets
