---
# Twenty CRM background worker
# Consumes BullMQ queues from Redis.  Shares the same local-storage PVC as the
# server so uploaded files are accessible during job processing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-worker
  namespace: twenty
  labels:
    app.kubernetes.io/name: twenty-worker
    app.kubernetes.io/part-of: twenty
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: twenty-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twenty-worker
        app.kubernetes.io/part-of: twenty
    spec:
      initContainers:
        - name: wait-for-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://twenty-server:3000/healthz; do
                echo "waiting for twenty-server…"; sleep 5; done
      containers:
        - name: twenty-worker
          image: twentycrm/twenty:latest
          imagePullPolicy: IfNotPresent
          command: ["yarn", "worker:prod"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: twenty-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twenty-db-secret
                  key: POSTGRES_PASSWORD
            - name: PG_DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@twenty-db:5432/default"
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: twenty-app-secret
                  key: APP_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: twenty-app-secret
                  key: ENCRYPTION_KEY
            - name: REDIS_URL
              value: "redis://twenty-redis:6379"
            - name: SERVER_URL
              value: "http://twenty.local:3000"
            # Worker must not re-run migrations or re-register cron jobs.
            - name: DISABLE_DB_MIGRATIONS
              value: "true"
            - name: DISABLE_CRON_JOBS_REGISTRATION
              value: "true"
          volumeMounts:
            - name: server-storage
              mountPath: /app/packages/twenty-server/.local-storage
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: server-storage
          persistentVolumeClaim:
            claimName: twenty-server-storage
