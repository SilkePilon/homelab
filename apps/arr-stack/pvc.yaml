# ─────────────────────────────────────────────────────────────────────────────
# PRE-REQUISITES for the SMB PersistentVolume below:
#
#  1. SMB CSI driver must be installed on the cluster (one-time):
#       helm repo add csi-driver-smb \
#         https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
#       helm install csi-driver-smb csi-driver-smb/csi-driver-smb \
#         --namespace kube-system
#
#  2. cifs-utils must be present on every k3s node:
#       sudo apt install cifs-utils   # Debian/Ubuntu
#
#  3. Edit the PersistentVolume below:
#       - Set `volumeAttributes.source` to your SMB share, e.g. //192.168.1.50/media
#
#  4. Create the smb-creds Secret (see secret.yaml).
# ─────────────────────────────────────────────────────────────────────────────

# ── Config volumes (one per app, local-path on k3s) ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: arr-stack
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
