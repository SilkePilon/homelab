# SMB credentials for the media share.
#
# !! DO NOT commit real credentials to git !!
# Create this secret out-of-band before applying the stack:
#
#   kubectl create secret generic smb-creds \
#     --from-literal username=YOUR_SMB_USER \
#     --from-literal password='YOUR_SMB_PASS' \
#     -n arr-stack
#
# Optionally append --from-literal domain="WORKGROUP" if your share needs it.
#
# The placeholder below is intentionally invalid — kubectl apply will fail
# loudly if you forget to create the real secret first.
apiVersion: v1
kind: Secret
metadata:
  name: smb-creds
  namespace: arr-stack
type: Opaque
stringData:
  username: CHANGE_ME
  password: CHANGE_ME
